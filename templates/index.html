<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUDLFT Registration</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>Bienvenue au portail d'inscription GUDLFT !</h1>
        <p>Veuillez entrer votre email de secrétaire pour continuer :</p>
        <form action="/showSummary" method="post">
            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" name="email" id="email" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-primary">Entrer</button>
        </form>
        
        <div class="mt-3">
            <a href="{{ url_for('competitions_list') }}" class="btn btn-info">Voir les compétitions à venir</a>
            
        </div>
    </div>
    <div class="container"></div>
        <h1 class="mt-5">Tableau des Points des Clubs</h1>
        <table class="table table-bordered table-striped mt-3 grayscale-table">
            <thead>
                <tr>
                    <th>Nom du Club</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                {% for club in clubs %}
                <tr>
                    <td>{{ club['name'] }}</td>
                    <td>{{ club['points'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

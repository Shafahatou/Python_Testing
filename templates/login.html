<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Connexion des Secrétaires de Clubs</h1>
        <form action="{{ url_for('login') }}" method="POST" class="mt-3">
            <div class="form-group">
                <label for="email">Adresse Email :</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Entrez votre adresse email" required>
            </div>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
        <a href="{{ url_for('index') }}" class="btn btn-link mt-3">Retour à l'accueil</a>
    </div>
</body>
</html>
